<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Metronome</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #1a1a1a;
      font-family: sans-serif;
      touch-action: none;
      overscroll-behavior: none;
      user-select: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      justify-content: center;
      position: relative;
    }

    .bottom-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .metronome-circle {
      width: 75vmin;
      height: 75vmin;
      border: 8px solid #000;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f5f5f5;
      transform-origin: center;
    }

    .metronome-circle.pulsing-heavy {
      animation: pulse-heavy 0.15s ease-out;
    }

    .metronome-circle.pulsing {
      animation: pulse 0.15s ease-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      100% {
        transform: scale(1.01);
      }
    }

    @keyframes pulse-heavy {
      0% {
        transform: scale(1);
      }
      100% {
        transform: scale(1.02);
      }
    }

    .bpm-container {
      position: relative;
    }

    .bpm-input {
      --bpm-input-width: 45vmin;
      --bpm-input-height: 25vmin;
      height: var(--bpm-input-height);
      width: var(--bpm-input-width);
      font-size: calc(var(--bpm-input-height) * .90);
      text-align: center;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      border: none;
      background-color: transparent;
      color: #333;
      font-weight: bold;
      -moz-appearance: textfield;
      outline: none;
      transition: box-shadow 0.2s ease;
    }

    .bpm-input::-webkit-outer-spin-button,
    .bpm-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .bpm-input:focus {
      box-shadow: 0 0 30px rgba(128, 128, 128, 0.5);
    }

    .bpm-input:focus-visible {
      outline: 3px solid #808080;
      outline-offset: 2px;
    }

    .play-pause-btn {
      --button-width: 75vmin;
      --button-height: calc((100vh - 75vmin) / 2);
      height: var(--button-height);
      width: var(--button-width);
      margin-top: calc(var(--button-height)/4);
      padding: 0;
      font-size: calc(var(--button-height) / 3);
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #333;
      color: #fff;
      transition: background-color 0.2s ease, transform 0.1s ease;
      min-height: 40px;
      min-width: 120px;
    }

    .play-pause-btn:hover {
      background-color: #444;
    }

    .play-pause-btn:active {
      transform: scale(0.98);
    }

    .play-pause-btn.running {
      background-color: #d32f2f;
      animation: pulse-btn 2s infinite;
    }

    .play-pause-btn.running:hover {
      background-color: #e53935;
    }

    .play-pause-btn.paused {
      background-color: #333;
    }

    .play-pause-btn.paused:hover {
      background-color: #444;
    }

    @keyframes pulse-btn {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.85;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="metronome-circle" id="circle">
      <input type="text" id="bpmInput" class="bpm-input" value="100" maxlength="3" autocomplete="off" aria-live="polite" aria-label="BPM value">
    </div>
    <div class="bottom-wrapper">
      <button id="playPauseBtn" class="play-pause-btn paused">Play</button>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // DOM elements
      const circle = document.getElementById('circle');
      const bpmInput = document.getElementById('bpmInput');
      const playPauseBtn = document.getElementById('playPauseBtn');

      // State
      let isRunning = true;
      let bpm = 100;
      let audioContext = null;
      let nextClickTime = 0;
      let clickCount = 0;
      let timerId = null;
      let originalBpmValue = bpm;

      // Constants
      const MIN_BPM = 30;
      const MAX_BPM = 300;

      // Initialize AudioContext on first user interaction
      function initAudio() {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      // Play click sound
      function playClickSound(isHeavyBeat) {
        if (!audioContext) return;

        const osc = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        osc.connect(gainNode);
        gainNode.connect(audioContext.destination);

        osc.frequency.value = 800;

        if (isHeavyBeat) {
          // For downbeat: Add high-frequency harmonics with a noise burst
          const bufferSize = audioContext.sampleRate * 0.1; // 100ms buffer
          const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
          }

          const noise = audioContext.createBufferSource();
          noise.buffer = buffer;
          const noiseGain = audioContext.createGain();
          noise.connect(noiseGain);
          noiseGain.connect(audioContext.destination);

          noiseGain.gain.setValueAtTime(0.6, audioContext.currentTime);
          noiseGain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
          noise.start(audioContext.currentTime);
        }

        // Regular click: pure sine tone
        osc.type = 'sine';
        gainNode.gain.setValueAtTime(0.25, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

        osc.start(audioContext.currentTime);
        osc.stop(audioContext.currentTime + 0.1);
      }

      // Pulse the circle
      function pulseCircle(isHeavyBeat) {
        initAudio();
        playClickSound(isHeavyBeat);

        circle.classList.remove('pulsing', 'pulsing-heavy');

        // Trigger reflow to restart animation
        void circle.offsetWidth;

        const pulseClass = isHeavyBeat ? 'pulsing-heavy' : 'pulsing';
        circle.classList.add(pulseClass);

        // Remove pulse class after animation completes
        setTimeout(() => {
          circle.classList.remove('pulsing', 'pulsing-heavy');
        }, 150);

        clickCount++;
      }

      // Schedule next click using precise timing
      let clickTimer = null;

      function scheduleNextClick() {
        if (!isRunning) return;

        // Cancel any pending timeout to prevent duplicate clicks when BPM changes
        if (clickTimer !== null) {
          clearTimeout(clickTimer);
        }

        const intervalMs = 60000 / bpm;
        nextClickTime = audioContext.currentTime * 1000 + intervalMs;

        // Schedule the click to happen at the exact calculated time
        clickTimer = setTimeout(() => {
          if (isRunning) {
            const isHeavyBeat = clickCount % 4 === 0;
            pulseCircle(isHeavyBeat);
          }
          // Recursively schedule the next click
          scheduleNextClick();
        }, intervalMs - 10);
      }

      // Start/stop the metronome
      function togglePlayPause() {
        initAudio();

        if (isRunning) {
          isRunning = false;
          playPauseBtn.textContent = 'Play';
          playPauseBtn.classList.remove('running');
        } else {
          isRunning = true;
          playPauseBtn.textContent = 'Pause';
          playPauseBtn.classList.add('running');

          if (audioContext.state === 'suspended') {
            audioContext.resume();
          }

          clickCount = 0;
          
          // Start the scheduling loop immediately
          scheduleNextClick();
        }
      }

      // Clamp BPM to valid range
      function clampBpm(bpm) {
        return Math.max(MIN_BPM, Math.min(MAX_BPM, bpm));
      }

      // Validate and update BPM
      function setBpm(value) {
        const parsed = parseInt(value, 10);

        if (isNaN(parsed)) {
          bpm = originalBpmValue;
          bpmInput.value = originalBpmValue;
          return false;
        }

        const clampedBpm = clampBpm(parsed);
        bpm = clampedBpm;
        bpmInput.value = bpm;
        originalBpmValue = bpm;
        return true;
      }

      // Event listeners for BPM input
      let pendingBpmValue = '';

      function handleBpmInput() {
        if (bpmInput.value === originalBpmValue) {
          return;
        }

        setBpm(bpmInput.value);
        if (isRunning && audioContext) {
          scheduleNextClick();
        }
      }

      function handleBpmFocus() {
        originalBpmValue = bpm;
        pendingBpmValue = bpm;
      }

      function handleBpmBlur() {
        const value = bpmInput.value;
        const parsed = parseInt(value, 10);

        if (value !== pendingBpmValue) {
          if (!isNaN(parsed) && parsed <= MAX_BPM) {
            setBpm(value);
          } else if (parsed > MAX_BPM) {
            setBpm(MAX_BPM);
          } else {
            setBpm(originalBpmValue);
          }
        }
      }

      function handleBpmKeydown(e) {
        if (e.key === 'Enter') {
          handleBpmInput();
          bpmInput.blur();
        } else if (e.key === 'Escape') {
          bpmInput.value = pendingBpmValue || originalBpmValue;
          bpmInput.blur();
        }
      }

      // Mouse wheel handling for BPM adjustment
      let scrollAccumulator = 0;
      let scrollLastTime = 0;

      function handleWheel(e) {
        e.preventDefault();

        const delta = e.deltaY;
        const absDelta = Math.abs(delta);

        // Determine scroll speed based on absolute scroll amount
        // Large scrolls (>= 120 pixels) are "fast", small scrolls are "slow"
        const increment = absDelta >= 240 ? 10 : 1;

        // Scroll up (negative delta) = increase BPM, Scroll down (positive delta) = decrease BPM
        const change = delta > 0 ? -increment : increment;

        // Apply new BPM with clamping
        const newBpm = Math.max(MIN_BPM, Math.min(MAX_BPM, bpm + change));
        bpm = newBpm;

        // Update display immediately
        bpmInput.value = bpm;

        // If running, update timing
        if (isRunning && audioContext) {
          scheduleNextClick();
        }
      }

      // Touch drag handling for mobile BPM adjustment (within .container)
      let isDragging = false;
      let touchStartY = 0;
      let dragAccumulator = 0;
      let dragLastTime = 0;
      const container = document.querySelector('.container');

      function handleTouchStart(e) {
        if (!container || !container.contains(e.target)) return;
        isDragging = true;
        touchStartY = e.touches[0].clientY;
        dragAccumulator = 0;
        dragLastTime = Date.now();
        e.preventDefault();
      }

      function handleTouchMove(e) {
        if (!isDragging) return;

        const currentTime = Date.now();
        const deltaY = e.touches[0].clientY - touchStartY;
        const deltaTime = currentTime - dragLastTime;

        // Track velocity over time
        if (deltaTime >= 16) {
          // Smooth accumulator based on pixel velocity
          const pixelsPerFrame = Math.abs(deltaY);
          const increment = pixelsPerFrame >= 240 ? 10 : 1;
          dragAccumulator += deltaY > 0 ? increment : -increment;

          // Clamp the accumulator
          dragAccumulator = Math.max(-50, Math.min(50, dragAccumulator));
        }

        touchStartY = e.touches[0].clientY;
        dragLastTime = currentTime;

        // Apply BPM change if enough velocity
        if (Math.abs(dragAccumulator) >= 1) {
          const change = dragAccumulator > 0 ? -1 : 1;
          const newBpm = Math.max(MIN_BPM, Math.min(MAX_BPM, bpm + change));
          bpm = newBpm;
          dragAccumulator = 0; // Reset accumulator after each update
          bpmInput.value = bpm;

          // If running, update timing
          if (isRunning && audioContext) {
            scheduleNextClick();
          }
        }
      }

      function handleTouchEnd() {
        if (!isDragging) return;
        isDragging = false;
      }

      function handleTouchCancel() {
        isDragging = false;
      }

      // Initialize
      function init() {
        playPauseBtn.addEventListener('click', togglePlayPause);

        bpmInput.addEventListener('focus', handleBpmFocus);
        bpmInput.addEventListener('blur', handleBpmBlur);
        bpmInput.addEventListener('keydown', handleBpmKeydown);
        bpmInput.addEventListener('wheel', handleWheel, { passive: false });

        // Touch event listeners for mobile BPM adjustment
        container.addEventListener('touchstart', handleTouchStart, { passive: true });
        container.addEventListener('touchmove', handleTouchMove, { passive: false });
        container.addEventListener('touchend', handleTouchEnd, { passive: true });
        container.addEventListener('touchcancel', handleTouchCancel, { passive: true });

        // Auto-start on page load with 100 BPM
        setBpm(100);
        togglePlayPause();

        // Handle audio context state changes
        document.addEventListener('click', () => {
          if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
          }
        }, { once: true });
      }

      init();
    })();
  </script>
</body>
</html>
