<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Metronome</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #1a1a1a;
      font-family: sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .metronome-circle {
      width: 75vmin;
      height: 75vmin;
      border: 8px solid #000;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f5f5f5;
      transition: border-color 0.1s ease;
    }

    .metronome-circle.flash-green {
      border-color: #00cc00;
    }

    .metronome-circle.flash-green-heavy {
      border-color: #00ff00;
    }

    .metronome-circle.paused {
      border-color: #333;
      opacity: 0.7;
    }

    .metronome-circle.pulsing {
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        border-color: #2a2a2a;
      }
      50% {
        border-color: #444;
      }
    }

    .bpm-container {
      position: relative;
    }

    .bpm-input {
      width: 180px;
      height: 120px;
      font-size: 72px;
      text-align: center;
      border: none;
      background-color: transparent;
      color: #333;
      font-weight: bold;
      -moz-appearance: textfield;
    }

    .bpm-input::-webkit-outer-spin-button,
    .bpm-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .bpm-input:focus {
      outline: 3px solid rgba(0, 255, 0, 0.4);
      outline-offset: 2px;
      box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
    }

    .bpm-input:focus-visible {
      outline: 3px solid #00ff00;
      outline-offset: 2px;
    }

    #bpmInput:hover,
    #bpmInput:focus {
      outline: none;
    }

    .hover-glow {
      box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
    }

    .bpm-input {
      transition: box-shadow 0.2s ease;
    }

    #playPauseBtn {
      margin-top: 40px;
      padding: 20px 60px;
      font-size: 28px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #333;
      color: #fff;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    #playPauseBtn:hover {
      background-color: #444;
    }

    #playPauseBtn:active {
      transform: scale(0.98);
    }

    .play-pause-btn {
      min-width: 180px;
    }

    .play-pause-btn.running {
      background-color: #d32f2f;
      animation: pulse-btn 2s infinite;
    }

    .play-pause-btn.running:hover {
      background-color: #e53935;
    }

    .play-pause-btn.paused {
      background-color: #333;
    }

    .play-pause-btn.paused:hover {
      background-color: #444;
    }

    @keyframes pulse-btn {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.85;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="metronome-circle" id="circle">
      <input type="text" id="bpmInput" class="bpm-input" value="100" maxlength="3" autocomplete="off" aria-live="polite" aria-label="BPM value">
    </div>
    <button id="playPauseBtn" class="play-pause-btn paused">Play</button>
  </div>

  <script>
    (function() {
      'use strict';

      // DOM elements
      const circle = document.getElementById('circle');
      const bpmInput = document.getElementById('bpmInput');
      const playPauseBtn = document.getElementById('playPauseBtn');

      // State
      let isRunning = true;
      let bpm = 100;
      let audioContext = null;
      let nextClickTime = 0;
      let clickCount = 0;
      let timerId = null;
      let originalBpmValue = bpm;

      // Constants
      const MIN_BPM = 30;
      const MAX_BPM = 300;

      // Initialize AudioContext on first user interaction
      function initAudio() {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      // Play click sound
      function playClickSound() {
        if (!audioContext) return;

        const osc = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        osc.connect(gainNode);
        gainNode.connect(audioContext.destination);

        osc.frequency.value = 1000;
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

        osc.start(audioContext.currentTime);
        osc.stop(audioContext.currentTime + 0.12);
      }

      // Flash the circle green
      function flashCircle(isHeavyBeat) {
        initAudio();
        playClickSound();

        circle.classList.remove('flash-green', 'flash-green-heavy');

        // Trigger reflow to restart animation
        void circle.offsetWidth;

        if (isHeavyBeat) {
          circle.classList.add('flash-green-heavy');
        } else {
          circle.classList.add('flash-green');
        }

        // Remove flash after animation
        setTimeout(() => {
          circle.classList.remove('flash-green', 'flash-green-heavy');
        }, 100);

        clickCount++;
      }

      // Schedule next click using precise timing
      let clickTimer = null;

      function scheduleNextClick() {
        if (!isRunning) return;

        // Cancel any pending timeout to prevent duplicate clicks when BPM changes
        if (clickTimer !== null) {
          clearTimeout(clickTimer);
        }

        const intervalMs = 60000 / bpm;
        nextClickTime = audioContext.currentTime * 1000 + intervalMs;

        // Schedule the click to happen at the exact calculated time
        clickTimer = setTimeout(() => {
          if (isRunning) {
            const isHeavyBeat = clickCount % 4 === 3;
            flashCircle(isHeavyBeat);
          }
          // Recursively schedule the next click
          scheduleNextClick();
        }, intervalMs - 10);
      }

      // Start/stop the metronome
      function togglePlayPause() {
        initAudio();

        if (isRunning) {
          isRunning = false;
          playPauseBtn.textContent = 'Play';
          playPauseBtn.classList.remove('running');
        } else {
          isRunning = true;
          playPauseBtn.textContent = 'Pause';
          playPauseBtn.classList.add('running');

          if (audioContext.state === 'suspended') {
            audioContext.resume();
          }

          clickCount = 0;
          
          // Start the scheduling loop immediately
          scheduleNextClick();
        }
      }

      // Validate and update BPM
      function setBpm(value) {
        const parsed = parseInt(value, 10);

        if (isNaN(parsed)) {
          bpm = originalBpmValue;
          bpmInput.value = originalBpmValue;
          return false;
        }

        if (parsed < MIN_BPM) {
          bpm = MIN_BPM;
          bpmInput.value = MIN_BPM;
        } else if (parsed > MAX_BPM) {
          bpm = MAX_BPM;
          bpmInput.value = MAX_BPM;
        } else {
          bpm = parsed;
        }

        originalBpmValue = bpm;
        return true;
      }

      // Event listeners for BPM input
      let pendingBpmValue = '';

      function handleBpmInput() {
        const value = bpmInput.value;

        if (value === '' || value === originalBpmValue) {
          return;
        }

        const parsed = parseInt(value, 10);

        if (isNaN(parsed)) {
          bpmInput.value = originalBpmValue;
          return;
        }

        let newBpm = parsed;

        // Clamp to valid range
        if (newBpm < MIN_BPM) {
          newBpm = MIN_BPM;
        } else if (newBpm > MAX_BPM) {
          newBpm = MAX_BPM;
        }

        // Apply new BPM only if it differs from current
        if (newBpm !== bpm) {
          bpm = newBpm;
          originalBpmValue = bpm;

          // Update display immediately when user accepts value
          bpmInput.value = bpm;

          // If running, reschedule timing
          if (isRunning && audioContext) {
            scheduleNextClick();
          }
        }
      }

      function handleBpmFocus() {
        originalBpmValue = bpm;
        pendingBpmValue = bpm;
        circle.classList.add('hover-glow');
      }

      function handleBpmBlur() {
        circle.classList.remove('hover-glow');
        // On blur, accept the value if it was valid
        if (bpmInput.value !== pendingBpmValue) {
          const parsed = parseInt(bpmInput.value, 10);
          if (!isNaN(parsed) && parsed >= MIN_BPM && parsed <= MAX_BPM) {
            bpm = parsed;
            originalBpmValue = bpm;
          } else if (parsed < MIN_BPM) {
            bpm = MIN_BPM;
            bpmInput.value = MIN_BPM;
            originalBpmValue = bpm;
          } else if (parsed > MAX_BPM) {
            bpm = MAX_BPM;
            bpmInput.value = MAX_BPM;
            originalBpmValue = bpm;
          } else {
            // Invalid input, revert to original
            bpmInput.value = originalBpmValue;
          }
        }
      }

      function handleBpmKeydown(e) {
        if (e.key === 'Enter') {
          handleBpmInput();
          bpmInput.blur();
        } else if (e.key === 'Escape') {
          bpmInput.value = pendingBpmValue || originalBpmValue;
        }
      }

      // Mouse wheel handling for BPM adjustment
      let scrollAccumulator = 0;
      let scrollLastTime = 0;

      function handleWheel(e) {
        e.preventDefault();

        const now = Date.now();
        const delta = e.deltaY;

        // Accumulate scroll to determine speed
        scrollAccumulator += Math.abs(delta);
        scrollLastTime = now;

        // Reset accumulator if too much time has passed (new scroll session)
        if (now - scrollLastTime > 300) {
          scrollAccumulator = Math.abs(delta);
          scrollLastTime = now;
        }

        // Determine scroll speed: 100 pixels in 300ms = fast, otherwise slow
        const scrollSpeed = scrollAccumulator / 300; // pixels per second
        const increment = scrollSpeed >= 33 ? 5 : 1;

        // Clamp delta to prevent extreme jumps within one scroll session
        const clampedDelta = Math.min(scrollAccumulator, Math.max(delta, -scrollAccumulator));
        const change = delta > 0 ? -increment : increment;

        // Apply new BPM with clamping
        const newBpm = Math.max(MIN_BPM, Math.min(MAX_BPM, bpm + change));
        bpm = newBpm;

        // Update display immediately
        bpmInput.value = bpm;

        // If running, update timing
        if (isRunning && audioContext) {
          scheduleNextClick();
        }

        // Reset for next scroll session
        if (scrollAccumulator > 20) {
          scrollAccumulator = 0;
        }
      }

      // Initialize
      function init() {
        playPauseBtn.addEventListener('click', togglePlayPause);

        bpmInput.addEventListener('focus', handleBpmFocus);
        bpmInput.addEventListener('blur', handleBpmBlur);
        bpmInput.addEventListener('keydown', handleBpmKeydown);
        bpmInput.addEventListener('wheel', handleWheel, { passive: false });

        // Auto-start on page load with 100 BPM
        setBpm(100);
        togglePlayPause();

        // Handle audio context state changes
        document.addEventListener('click', () => {
          if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
          }
        }, { once: true });

        document.addEventListener('keydown', (e) => {
          if (document.activeElement === bpmInput && e.key === 'Enter') {
            handleBpmInput();
          } else if (document.activeElement === bpmInput && e.key === 'Escape') {
            bpmInput.value = pendingBpmValue || originalBpmValue;
          }
        });
      }

      init();
    })();
  </script>
</body>
</html>
